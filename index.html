<!DOCTYPE html>
<html>
<head>
  <title>股市分析方案</title>
  <style>
    body { font-family: Microsoft YaHei; margin: 20px; }
    input { padding: 8px; width: 200px; margin-right: 10px; }
    button { padding: 8px 15px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    #result { margin-top: 15px; border: 1px solid #ddd; padding: 10px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>📊 股市分析方案</h1>
  <p>输入股票代码（如 <strong>SH600000</strong>）后点击按钮查看实时分析：</p>
  <input type="text" id="stock-code" placeholder="股票代码（A股：SH/600000；美股：NASDAQ:AAPL）">
  <button type="button" id="analyze-btn">分析</button>
  <div id="result"></div>

  <script>
    document.getElementById('analyze-btn').addEventListener('click', function() {
      const code = document.getElementById('stock-code').value.trim();
      if (!code) return;
      
      // 模拟真实分析（实际部署时可替换为API调用）
      const result = {
        code: code,
        price: `¥${Math.random().toFixed(2)}`,
        change: `+${Math.random().toFixed(1)}%`,
        trend: `短期${Math.random() > 0.5 ? '上升' : '下降'}趋势`
      };
      
      // 显示分析结果
      document.getElementById('result').innerHTML = `
        <h3>🔍 股票分析结果</h3>
        <p><strong>股票代码：</strong>${result.code}</p>
        <p><strong>当前价格：</strong>${result.price}</p>
        <p><strong>涨跌幅：</strong>${result.change}</p>
        <p><strong>趋势分析：</strong>${result.trend}</p>
      `;
    });
  </script>
</body>
</html>
